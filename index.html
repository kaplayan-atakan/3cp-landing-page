<!doctype html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="/favicon.ico" sizes="any" />
    <link rel="apple-touch-icon" href="/images/logo-mark.jpg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="light dark" />
    <!-- FOUC önleyici: tema, CSS ve React yüklenmeden data-theme olarak basılır.
         Öncelik: localStorage('theme') → prefers-color-scheme → light. -->
    <script>
      (function () {
        try {
          var stored = localStorage.getItem('theme');
          var theme =
            stored === 'dark' || stored === 'light'
              ? stored
              : window.matchMedia('(prefers-color-scheme: dark)').matches
                ? 'dark'
                : 'light';
          document.documentElement.dataset.theme = theme;
        } catch (e) {
          document.documentElement.dataset.theme = 'light';
        }
      })();
    </script>
    <title>3CP — Merkezi Müşteri Kontrol Paneli</title>
    <meta
      name="description"
      content="3CP, çok şubeli ve çok markalı restoran zincirleri için çok-kiracılı bir müşteri yönetim platformudur. Anket, şikayet, kampanya ve çağrı verisini yapay zeka ile otomatik sınıflandırın."
    />
    <meta property="og:title" content="3CP — Merkezi Müşteri Kontrol Paneli" />
    <meta
      property="og:description"
      content="Restoran zincirleri için tek panelde toplanan müşteri geri bildirimi — yapay zeka ile otomatik anlamlandırılmış."
    />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="/images/logo-wordmark.png" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
